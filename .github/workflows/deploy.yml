name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Verify build output
        run: |
          echo "Checking build output..."
          ls -la dist/
          if [ -f "dist/index.html" ]; then
            echo "✓ index.html exists"
            echo "First 30 lines of built index.html:"
            head -30 dist/index.html
            echo ""
            echo "Checking for .jsx references (should be none):"
            if grep -q "\.jsx" dist/index.html; then
              echo "⚠ WARNING: Built index.html still contains .jsx references!"
              exit 1
            else
              echo "✓ No .jsx references found in built HTML"
            fi
          else
            echo "✗ index.html missing!"
            exit 1
          fi
      
      - name: Create .nojekyll file
        run: |
          touch dist/.nojekyll
          echo "✓ Created .nojekyll to disable Jekyll processing"
      
      - name: Verify CNAME exists
        run: |
          if [ -f "dist/CNAME" ]; then
            echo "✓ CNAME file found in dist"
            cat dist/CNAME
          else
            echo "✗ CNAME file missing! Creating it..."
            echo "kerryandshellygetmarried.com" > dist/CNAME
          fi
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
